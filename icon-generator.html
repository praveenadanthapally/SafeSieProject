<!DOCTYPE html>
<html>
<head>
    <title>SafeSie Icon Generator</title>
</head>
<body>
    <h2>SafeSie App Icons</h2>
    <p>Right-click each icon and save as PNG:</p>
    
    <div style="display: flex; flex-wrap: wrap; gap: 20px;">
        <div>
            <h3>72x72</h3>
            <canvas id="icon72" width="72" height="72"></canvas>
        </div>
        <div>
            <h3>96x96</h3>
            <canvas id="icon96" width="96" height="96"></canvas>
        </div>
        <div>
            <h3>128x128</h3>
            <canvas id="icon128" width="128" height="128"></canvas>
        </div>
        <div>
            <h3>144x144</h3>
            <canvas id="icon144" width="144" height="144"></canvas>
        </div>
        <div>
            <h3>192x192</h3>
            <canvas id="icon192" width="192" height="192"></canvas>
        </div>
        <div>
            <h3>512x512</h3>
            <canvas id="icon512" width="512" height="512"></canvas>
        </div>
    </div>
    
    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#6366f1');
            gradient.addColorStop(1, '#ec4899');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Border radius effect
            ctx.globalCompositeOperation = 'destination-in';
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, size * 0.2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            
            // Shield icon
            ctx.strokeStyle = 'white';
            ctx.fillStyle = 'white';
            ctx.lineWidth = size * 0.06;
            
            const centerX = size / 2;
            const centerY = size / 2;
            const shieldSize = size * 0.5;
            
            // Draw shield
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - shieldSize * 0.5);
            ctx.lineTo(centerX + shieldSize * 0.5, centerY - shieldSize * 0.2);
            ctx.lineTo(centerX + shieldSize * 0.5, centerY + shieldSize * 0.2);
            ctx.quadraticCurveTo(centerX + shieldSize * 0.5, centerY + shieldSize * 0.5, centerX, centerY + shieldSize * 0.6);
            ctx.quadraticCurveTo(centerX - shieldSize * 0.5, centerY + shieldSize * 0.5, centerX - shieldSize * 0.5, centerY + shieldSize * 0.2);
            ctx.lineTo(centerX - shieldSize * 0.5, centerY - shieldSize * 0.2);
            ctx.closePath();
            ctx.stroke();
            
            // Inner checkmark or mic symbol
            ctx.beginPath();
            ctx.arc(centerX, centerY, shieldSize * 0.15, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw all icons
        [72, 96, 128, 144, 192, 512].forEach(size => {
            const canvas = document.getElementById(`icon${size}`);
            if (canvas) drawIcon(canvas);
        });
    </script>
</body>
</html>
